<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Datamatch</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="/">Datamatch</a>
            </div>
            <div class="nav-menu">
                <div class="nav-links">
                    <a id="navQuiz" class="nav-profile-btn" href="/quiz.html" style="display: none;">Quiz</a>
                    <a id="navMatches" class="nav-profile-btn" href="/matches.html" style="display: none;">Matches</a>
                    <a id="navMessages" class="nav-profile-btn" href="/messages.html" style="display: none;">Messages</a>
                    <a id="navFAQ" class="nav-profile-btn" href="/faq.html">FAQ</a>
                </div>
                <button id="profileBtn" class="nav-profile-btn">                    
                    <span id="profileBtnText">Profile</span>
                </button>
                <button id="logoutBtn" class="nav-profile-btn" style="background: #dc3545;">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Your Dashboard</h1>
            </div>
            
            <div class="dashboard-grid">
                <aside class="profile-column">
                    <div class="profile-card">
                        <h2>Your Profile</h2>
                        <div id="userProfile" class="user-profile">
                        </div>
                            <form id="profileForm" class="user-profile">
                                <div class="form-row">
                                    <label for="profileName">Name</label>
                                    <input id="profileName" name="name" type="text" />
                                </div>
                                <div class="form-row">
                                    <label for="profileEmail">Email</label>
                                    <input id="profileEmail" name="email" type="email" disabled />
                                </div>
                                <div class="form-row">
                                    <label for="profileAge">Age</label>
                                    <input id="profileAge" name="age" type="number" min="0" />
                                </div>
                                <div class="form-row">
                                    <label for="profileHometown">Hometown</label>
                                    <input id="profileHometown" name="home_location" type="text" />
                                </div>
                                <div class="form-row">
                                    <label for="profileCampus">Campus</label>
                                    <select id="profileCampus" name="campus">
                                        <option value="">Select campus</option>
                                        <option value="Harvey Mudd">Harvey Mudd</option>
                                        <option value="Pitzer">Pitzer</option>
                                        <option value="Pomona">Pomona</option>
                                        <option value="Claremont McKenna">Claremont McKenna</option>
                                        <option value="Scripps">Scripps</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <input id="profileCampusOther" name="campus_other" type="text" placeholder="Other campus" style="display:none;margin-top:6px;" />
                                </div>
                                <div class="form-row">
                                    <label for="profileYear">Year</label>
                                    <select id="profileYear" name="year">
                                        <option value="">Select year</option>
                                        <option value="Freshman">Freshman</option>
                                        <option value="Sophomore">Sophomore</option>
                                        <option value="Junior">Junior</option>
                                        <option value="Senior">Senior</option>
                                        <option value="Super Senior">Super Senior</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <label for="profileInstagram">Instagram</label>
                                    <input id="profileInstagram" name="social_media_accounts" type="text" placeholder="instagram: @yourhandle" />
                                </div>
                                <div class="form-row">
                                    <label for="profileGender">Gender Identity</label>
                                    <select id="profileGender" name="gender">
                                        <option value="">Select gender</option>
                                        <option value="Woman">Woman</option>
                                        <option value="Man">Man</option>
                                        <option value="Non-binary">Non-binary</option>
                                        <option value="Genderqueer/Genderfluid">Genderqueer/Genderfluid</option>
                                        <option value="Questioning">Questioning</option>
                                        <option value="Prefer not to say">Prefer not to say</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <input id="profileGenderOther" name="gender_other" type="text" placeholder="If Other, please specify" style="display:none;margin-top:6px;" />
                                </div>
                                <div class="form-row">
                                    <label for="profileOrientation">Sexual Orientation</label>
                                    <select id="profileOrientation" name="sexual_orientation">
                                        <option value="">Select orientation</option>
                                        <option value="Heterosexual">Heterosexual</option>
                                        <option value="Homosexual">Homosexual</option>
                                        <option value="Bisexual">Bisexual</option>
                                        <option value="Asexual">Asexual</option>
                                        <option value="Pansexual">Pansexual</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <input id="profileOrientationOther" name="orientation_other" type="text" placeholder="If Other, please specify" style="display:none;margin-top:6px;" />
                                </div>

                                <div class="profile-actions">
                                    <button type="button" id="profileSaveBtn" class="btn-primary">Save Profile</button>
                                    <a href="/quiz.html" id="profileTakeQuizBtn" class="btn-secondary">Take the quiz</a>
                                </div>
                            </form>
                    </div>
                </aside>

                <section class="analysis-column">
                    <div id="profileAnalysis" class="analysis-card">
                        <h2>A closer look at you....</h2>
                        <div id="analysisContent">
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
